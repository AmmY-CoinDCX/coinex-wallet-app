name: coinex_wallet
description: A crypto wallet app for CoinDCX exchange
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: any
  crypto: ^3.0.3
  shared_preferences: ^2.2.2
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.1.8
  # Git dependency — pulls code directly from repo
  custom_auth:
    git:
      url: https://github.com/example-org/custom-auth-flutter.git
      ref: main

dependency_overrides:
  http: ^1.2.0
