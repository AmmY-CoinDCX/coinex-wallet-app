# ═══════════════════════════════════════════════════════════════════════════════
# DartShield Security Scan
# ═══════════════════════════════════════════════════════════════════════════════
#
# Triggers when a PR targets main/master branch.
# Scans Dart/Flutter code for 37 vulnerability rules.
# Blocks merge if Critical or High severity findings are detected.
# All scan data is stored in the DartShield dashboard.
#
# SETUP:
#   1. Set repository variable:  DARTSHIELD_URL = https://<your-ngrok-or-server-url>
#   2. (Optional) Set secret:    DARTSHIELD_API_KEY = <key>
#   3. Make this a required check: Settings → Branches → main → Require "DartShield / security-scan"
# ═══════════════════════════════════════════════════════════════════════════════

name: DartShield

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, master]

concurrency:
  group: dartshield-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create repo ZIP
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          ZIP_NAME="${REPO_NAME}-${GITHUB_SHA::8}.zip"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "REPO_NAME=$REPO_NAME" >> $GITHUB_ENV

          zip -r "$ZIP_NAME" . \
            --exclude ".git/*" \
            --exclude "build/*" \
            --exclude ".dart_tool/*" \
            --exclude ".pub-cache/*" \
            --exclude "*.zip"

          echo "Created $ZIP_NAME ($(du -sh "$ZIP_NAME" | cut -f1))"

      - name: Submit scan to DartShield
        id: submit
        env:
          DARTSHIELD_URL: ${{ vars.DARTSHIELD_URL }}
          DARTSHIELD_API_KEY: ${{ secrets.DARTSHIELD_API_KEY }}
        run: |
          if [ -z "$DARTSHIELD_URL" ]; then
            echo "::error::DARTSHIELD_URL variable is not set. Go to Settings → Secrets and variables → Actions → Variables and add it."
            exit 1
          fi

          echo "Submitting to $DARTSHIELD_URL ..."

          RESPONSE=$(curl -sf \
            -X POST "$DARTSHIELD_URL/api/scan/upload" \
            ${DARTSHIELD_API_KEY:+-H "X-API-Key: $DARTSHIELD_API_KEY"} \
            -F "file=@$ZIP_NAME" \
            -F 'options={"skip_tests":true}' \
            -F "source=github_actions" \
            -F "pr_number=${{ github.event.pull_request.number }}" \
            -F "branch=${{ github.head_ref || github.ref_name }}" \
            -F "commit_sha=${{ github.sha }}" \
            -F "triggered_by=${{ github.actor }}" \
            -F "repo_full_name=${{ github.repository }}" \
          )

          echo "Response: $RESPONSE"

          SCAN_ID=$(echo "$RESPONSE" | jq -r '.scan_id // empty')
          if [ -z "$SCAN_ID" ]; then
            echo "::error::DartShield API submission failed. Response: $RESPONSE"
            exit 1
          fi

          echo "SCAN_ID=$SCAN_ID" >> $GITHUB_ENV
          echo "scan_id=$SCAN_ID" >> $GITHUB_OUTPUT
          echo "✅ Scan submitted. ID: $SCAN_ID"

      - name: Wait for scan results
        id: poll
        env:
          DARTSHIELD_URL: ${{ vars.DARTSHIELD_URL }}
          DARTSHIELD_API_KEY: ${{ secrets.DARTSHIELD_API_KEY }}
        run: |
          MAX_WAIT=300
          INTERVAL=5
          ELAPSED=0

          echo "Polling scan $SCAN_ID ..."

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            RESULT=$(curl -sf \
              "$DARTSHIELD_URL/api/scan/$SCAN_ID/ci-result" \
              ${DARTSHIELD_API_KEY:+-H "X-API-Key: $DARTSHIELD_API_KEY"} \
            ) || { echo "  ⏳ [${ELAPSED}s] Polling error, retrying..."; sleep $INTERVAL; ELAPSED=$((ELAPSED + INTERVAL)); continue; }

            DONE=$(echo "$RESULT" | jq -r '.done')
            STATUS=$(echo "$RESULT" | jq -r '.status')

            if [ "$DONE" = "true" ]; then
              echo "  ✅ Scan complete (status=$STATUS)"
              echo "$RESULT" > /tmp/ci_result.json
              break
            fi

            echo "  ⏳ [${ELAPSED}s] status=$STATUS"
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ $ELAPSED -ge $MAX_WAIT ]; then
            echo "::error::Scan timed out after ${MAX_WAIT}s"
            exit 1
          fi

          CRITICAL=$(jq -r '.critical'       /tmp/ci_result.json)
          HIGH=$(jq -r '.high'               /tmp/ci_result.json)
          MEDIUM=$(jq -r '.medium'           /tmp/ci_result.json)
          LOW=$(jq -r '.low'                 /tmp/ci_result.json)
          TOTAL=$(jq -r '.total'             /tmp/ci_result.json)
          BLOCKING=$(jq -r '.blocking_count' /tmp/ci_result.json)
          PASSED=$(jq -r '.passed'           /tmp/ci_result.json)
          REPORT_URL=$(jq -r '.report_url'   /tmp/ci_result.json)

          echo "critical=$CRITICAL"     >> $GITHUB_OUTPUT
          echo "high=$HIGH"             >> $GITHUB_OUTPUT
          echo "medium=$MEDIUM"         >> $GITHUB_OUTPUT
          echo "low=$LOW"               >> $GITHUB_OUTPUT
          echo "total=$TOTAL"           >> $GITHUB_OUTPUT
          echo "blocking=$BLOCKING"     >> $GITHUB_OUTPUT
          echo "passed=$PASSED"         >> $GITHUB_OUTPUT
          echo "report_url=$REPORT_URL" >> $GITHUB_OUTPUT

          echo ""
          echo "╔══════════════════════════════════════╗"
          echo "║   DartShield Scan Results            ║"
          echo "╠══════════════════════════════════════╣"
          echo "║   🔴 Critical:  $CRITICAL                       ║"
          echo "║   🟠 High:      $HIGH                      ║"
          echo "║   🟡 Medium:    $MEDIUM                       ║"
          echo "║   🟢 Low:       $LOW                       ║"
          echo "║   Total:        $TOTAL                      ║"
          echo "║   Blocking:     $BLOCKING                      ║"
          echo "╚══════════════════════════════════════╝"

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          SCAN_ID: ${{ env.SCAN_ID }}
        with:
          script: |
            const fs = require('fs');
            let result;
            try {
              result = JSON.parse(fs.readFileSync('/tmp/ci_result.json', 'utf8'));
            } catch (e) {
              console.log('No result file — skipping comment');
              return;
            }

            const {
              critical, high, medium, low, total,
              blocking_count, passed, report_url,
              findings_summary, scan_id, status
            } = result;

            const statusEmoji = passed ? '✅' : '🚨';
            const statusLine  = passed
              ? 'No Critical or High findings — scan **passed**'
              : `**${blocking_count} blocking finding(s)** (Critical + High) — PR merge blocked`;

            let body = `## ${statusEmoji} DartShield Security Scan\n\n`;
            body += `${statusLine}\n\n`;

            body += `| Severity | Count |\n`;
            body += `|---|---|\n`;
            body += `| 🔴 Critical | \`${critical}\` |\n`;
            body += `| 🟠 High     | \`${high}\` |\n`;
            body += `| 🟡 Medium   | \`${medium}\` |\n`;
            body += `| 🟢 Low      | \`${low}\` |\n`;
            body += `| **Total**   | **\`${total}\`** |\n\n`;

            if (findings_summary && findings_summary.length > 0) {
              body += `### Blocking Findings\n\n`;
              body += `| Severity | Rule | File | Line |\n`;
              body += `|---|---|---|---|\n`;
              for (const f of findings_summary.slice(0, 20)) {
                const sev  = f.severity === 'Critical' ? '🔴 Critical' : '🟠 High';
                const file = f.file.length > 55 ? '…' + f.file.slice(-52) : f.file;
                body += `| ${sev} | ${f.rule_name} | \`${file}\` | ${f.line} |\n`;
              }
              if (findings_summary.length >= 20) {
                body += `\n_Table capped at 20 rows — see full report._\n`;
              }
              body += '\n';
            } else if (total > 0) {
              body += `_No Critical/High findings. ${medium} Medium and ${low} Low findings detected._\n\n`;
            } else {
              body += `_No security issues detected._\n\n`;
            }

            body += `---\n`;
            body += `📊 [Full Report](${report_url})`;
            body += ` · 🔍 Scan \`${scan_id.slice(0, 8)}\``;
            body += ` · 🛡️ Powered by DartShield\n`;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.data.find(c =>
              c.user?.type === 'Bot' &&
              c.body?.includes('DartShield Security Scan')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Security Gate
        if: always()
        run: |
          BLOCKING="${{ steps.poll.outputs.blocking }}"
          PASSED="${{ steps.poll.outputs.passed }}"
          CRITICAL="${{ steps.poll.outputs.critical }}"
          HIGH="${{ steps.poll.outputs.high }}"

          if [ -z "$BLOCKING" ]; then
            echo "⚠️ No poll results — DartShield may be unavailable. Allowing PR."
            exit 0
          fi

          if [ "$PASSED" = "false" ] && [ "$BLOCKING" != "0" ]; then
            echo ""
            echo "::error::🚨 SECURITY GATE FAILED"
            echo "::error::   Critical: $CRITICAL | High: $HIGH | Total blocking: $BLOCKING"
            echo "::error::   Fix these vulnerabilities before merging to main."
            exit 1
          fi

          echo "✅ Security gate PASSED (Critical=$CRITICAL  High=$HIGH)"
